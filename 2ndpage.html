<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />
  <meta name="theme-color" content="#f2d8e2" />
  <title>UNLOCK OUR LOVE</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --pink-main: #d86c9c;
      --pink-deep: #c85a8d;
      --pink-soft: #ff9ecf;
      --pink-light: #f8bbd0;
      --text-soft: #b85f87;

      --glass: rgba(255, 255, 255, 0.78);
      --glass-strong: rgba(255, 255, 255, 0.92);
      --shadow-soft: 0 14px 32px rgba(216, 108, 156, 0.14);
      --shadow-strong: 0 24px 60px rgba(0, 0, 0, 0.28);

      --frame-radius: 50px;
      --screen-radius: 40px;
      --phone-width: min(390px, 94vw);
      --ease: 0.22s ease;
    }

    html,
    body {
      width: 100%;
      margin: 0;
      overflow: hidden;
      overscroll-behavior: none;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0d7df;
      touch-action: manipulation;
      min-height: 100vh;
      min-height: 100dvh;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      min-height: -webkit-fill-available;
      display: flex;
      justify-content: center;
      align-items: center;
      user-select: none;
      -webkit-user-select: none;
    }

    button {
      font-family: inherit;
      transition:
        transform 0.15s ease,
        box-shadow var(--ease),
        opacity var(--ease),
        background var(--ease);
      border: none;
      outline: none;
      cursor: pointer;
    }

    button:active {
      transform: scale(0.95);
    }

    .phone-frame {
      width: var(--phone-width);
      aspect-ratio: 390 / 844;
      background: #000;
      border-radius: var(--frame-radius);
      padding: 12px;
      box-shadow: var(--shadow-strong);
      position: relative;
    }

    .phone-screen {
      width: 100%;
      height: 100%;
      border-radius: var(--screen-radius);
      overflow: hidden;
      position: relative;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      background:
        linear-gradient(180deg, rgba(255, 235, 243, 0.96), rgba(240, 215, 223, 0.92));
      animation: appLaunch 0.72s ease-out;
      isolation: isolate;
    }

    .notch {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 150px;
      height: 28px;
      background: #000;
      border-radius: 20px;
      z-index: 20;
      pointer-events: none;
    }

    @keyframes appLaunch {
      0% {
        opacity: 0;
        transform: scale(0.93);
        filter: blur(8px);
      }
      70% {
        opacity: 1;
        transform: scale(1.015);
        filter: blur(0);
      }
      100% {
        transform: scale(1);
      }
    }

    video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;
      z-index: 0;
    }

    .video-fallback {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at top, rgba(255, 214, 230, 0.45), transparent 45%),
        linear-gradient(180deg, #f8d8e4 0%, #e7bfd0 48%, #d8a9bf 100%);
      z-index: -1;
      pointer-events: none;
    }

    .video-tint {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        180deg,
        rgba(255, 240, 246, 0.2),
        rgba(255, 211, 228, 0.13),
        rgba(255, 182, 213, 0.08)
      );
      z-index: 1;
      pointer-events: none;
    }

    .vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, transparent 28%, rgba(0, 0, 0, 0.56));
      z-index: 2;
      pointer-events: none;
    }

    .content {
      position: absolute;
      inset: 0;
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding:
        calc(env(safe-area-inset-top) + 40px)
        20px
        calc(env(safe-area-inset-bottom) + 34px);
      gap: 18px;
    }

    .chat-wrap {
      width: 100%;
      max-width: 310px;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 0;
    }

    .chat {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .bubble {
      padding: 11px 14px;
      border-radius: 18px;
      max-width: 86%;
      font-size: 13px;
      line-height: 1.45;
      opacity: 0;
      transform: translateY(10px);
      animation: fadeBubble 0.6s forwards;
      word-wrap: break-word;
      overflow-wrap: break-word;
      box-shadow: 0 10px 22px rgba(0, 0, 0, 0.12);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .bubble.me {
      align-self: flex-end;
      background: rgba(255, 158, 207, 0.95);
      color: #fff;
      box-shadow: 0 10px 22px rgba(255, 158, 207, 0.28);
    }

    .bubble.you {
      align-self: flex-start;
      background: rgba(255, 255, 255, 0.96);
      color: var(--pink-deep);
    }

    @keyframes fadeBubble {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .heart-btn {
      display: none;
      width: 144px;
      height: 134px;
      cursor: pointer;
      background: linear-gradient(45deg, #ff6fa5, #ff9ecf);
      clip-path: path("M72 124 C 21 89 0 62 0 38 C 0 16 16 0 38 0 C 53 0 64 8 72 19 C 80 8 91 0 106 0 C 128 0 144 16 144 38 C 144 62 123 89 72 124 Z");
      box-shadow: 0 18px 35px rgba(255, 105, 180, 0.35);
      position: relative;
      padding: 0;
      flex-shrink: 0;
    }

    .heart-btn span {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      letter-spacing: 0.4px;
      font-size: 14px;
      transform: translateY(6px);
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.22);
      user-select: none;
      -webkit-user-select: none;
      pointer-events: none;
    }

    .show {
      display: block;
      animation: pop 0.55s ease;
    }

    @keyframes pop {
      0% { transform: scale(0); }
      80% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    .intro-heart {
      position: absolute;
      font-size: 20px;
      opacity: 0;
      animation: floatUp 3s linear forwards;
      z-index: 4;
      pointer-events: none;
      filter: drop-shadow(0 4px 10px rgba(255, 255, 255, 0.25));
    }

    @keyframes floatUp {
      0% {
        transform: translateY(100px) scale(0.9);
        opacity: 0;
      }
      30% {
        opacity: 1;
      }
      100% {
        transform: translateY(-140px) scale(1.08);
        opacity: 0;
      }
    }

    .fade-out {
      animation: fadeOut 0.85s forwards;
    }

    @keyframes fadeOut {
      to {
        opacity: 0;
        transform: scale(1.03);
      }
    }

    @media (max-width: 500px) {
      html,
      body {
        background: #000;
      }

      body {
        width: 100vw;
        min-height: 100vh;
        min-height: 100dvh;
        min-height: -webkit-fill-available;
      }

      .phone-frame {
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        aspect-ratio: auto;
        border-radius: 0;
        padding: 0;
        box-shadow: none;
        background: transparent;
      }

      .phone-screen {
        border-radius: 0;
      }

      .notch {
        display: none;
      }
    }

    @media (max-height: 680px) {
      .content {
        padding:
          calc(env(safe-area-inset-top) + 28px)
          16px
          calc(env(safe-area-inset-bottom) + 22px);
        gap: 12px;
      }

      .chat-wrap {
        max-width: 300px;
      }

      .heart-btn {
        width: 130px;
        height: 120px;
      }

      .heart-btn span {
        font-size: 13px;
      }

      .bubble {
        font-size: 12.5px;
        padding: 10px 12px;
      }

      .chat {
        gap: 8px;
      }
    }
  </style>
</head>

<body>
  <div class="phone-frame">
    <div class="phone-screen" id="screen">
      <div class="video-fallback"></div>
      <div class="notch"></div>

      <video id="bgVideo" autoplay muted loop playsinline preload="auto">
        <source src="clips/bg.mp4" type="video/mp4" />
      </video>

      <div class="video-tint"></div>
      <div class="vignette"></div>

      <div class="content">
        <div class="chat-wrap">
          <div class="chat" id="chat"></div>
        </div>

        <button class="heart-btn" id="nextBtn" type="button" aria-label="Next">
        </button>
      </div>
    </div>
  </div>

  <audio id="bgMusic" loop preload="auto">
    <source src="musics/2ndpage.mp3" type="audio/mpeg" />
  </audio>

  <script>
    const screen = document.getElementById("screen");
    const chat = document.getElementById("chat");
    const nextBtn = document.getElementById("nextBtn");
    const music = document.getElementById("bgMusic");
    const bgVideo = document.getElementById("bgVideo");

    const messages = [
      { type: "you", text: "Hi, Baby." },
      { type: "me", text: "Hmm?" },
      { type: "you", text: "Ready ka na bang balikan ang lahat?😂" },
      { type: "me", text: "Just tap my heart.😚" }
    ];

    let index = 0;
    let musicStarted = false;
    let pageLeaving = false;
    let chatStarted = false;
    let chatTimer = null;

    function tryPlayMusic() {
      if (musicStarted) return;

      music.play()
        .then(() => {
          musicStarted = true;
        })
        .catch(() => {});
    }

    function createHeart() {
      const heart = document.createElement("div");
      heart.className = "intro-heart";
      heart.textContent = "💖";
      heart.style.left = Math.random() * 100 + "%";
      heart.style.top = "72%";
      screen.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 3000);
    }

    function showBubble() {
      if (index >= messages.length) {
        nextBtn.classList.add("show");
        return;
      }

      const bubble = document.createElement("div");
      bubble.className = "bubble " + messages[index].type;
      bubble.textContent = messages[index].text;
      chat.appendChild(bubble);

      index++;
      chatTimer = setTimeout(showBubble, 1200);
    }

    function startChatSequence() {
      if (chatStarted) return;
      chatStarted = true;
      chatTimer = setTimeout(showBubble, 800);
    }

    function handleFirstInteraction() {
      tryPlayMusic();
      startChatSequence();
    }

    for (let i = 0; i < 8; i++) {
      setTimeout(createHeart, i * 220);
    }

    document.addEventListener("pointerdown", handleFirstInteraction, { once: true });
    document.addEventListener("keydown", handleFirstInteraction, { once: true });

    setTimeout(() => {
      startChatSequence();
    }, 1000);

    nextBtn.addEventListener("click", () => {
      if (pageLeaving) return;
      pageLeaving = true;

      if (chatTimer) clearTimeout(chatTimer);

      screen.classList.add("fade-out");
      setTimeout(() => {
        window.location.href = "hubpage.html";
      }, 850);
    });

    bgVideo.addEventListener("error", () => {
      console.warn("Background video failed to load.");
    });
  </script>
</body>
</html>
