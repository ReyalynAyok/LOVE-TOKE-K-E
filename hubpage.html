   hubpage.html

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />
  <meta name="theme-color" content="#fce4ec" />
  <title>LOVE TOKEN K&E</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --pink-main: #d86c9c;
      --pink-deep: #c85a8d;
      --pink-soft: #f48fb1;
      --pink-light: #f8bbd0;
      --pink-border: #f4a6c8;
      --text-soft: #b85f87;

      --bg-1: #fff7fb;
      --bg-2: #ffeaf4;
      --bg-3: #fbeaff;

      --card-bg: rgba(255, 255, 255, 0.82);
      --shadow-soft: 0 14px 32px rgba(216, 108, 156, 0.14);
      --shadow-strong: 0 24px 60px rgba(0, 0, 0, 0.28);
      --shadow-hover: 0 18px 36px rgba(216, 108, 156, 0.22);

      --frame-radius: 50px;
      --screen-radius: 40px;
      --phone-width: min(390px, 94vw);
      --ease: 0.22s ease;
    }

    html,
    body {
      width: 100%;
      margin: 0;
      overflow: hidden;
      overscroll-behavior: none;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fce4ec;
      touch-action: manipulation;
      min-height: 100vh;
      min-height: 100dvh;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      min-height: -webkit-fill-available;
      display: flex;
      justify-content: center;
      align-items: center;
      user-select: none;
      -webkit-user-select: none;
    }

    button {
      font-family: inherit;
      border: none;
      outline: none;
      background: none;
      cursor: pointer;
      transition:
        transform 0.16s ease,
        box-shadow var(--ease),
        opacity var(--ease),
        background var(--ease),
        filter var(--ease);
    }

    button:active {
      transform: scale(0.96);
    }

    .phone-frame {
      width: var(--phone-width);
      aspect-ratio: 390 / 844;
      background: #000;
      border-radius: var(--frame-radius);
      padding: 12px;
      box-shadow: var(--shadow-strong);
      position: relative;
      isolation: isolate;
    }

    .phone-screen {
      width: 100%;
      height: 100%;
      border-radius: var(--screen-radius);
      overflow: hidden;
      position: relative;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.58), transparent 30%),
        linear-gradient(180deg, var(--bg-1), var(--bg-2), var(--bg-3));
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      animation: appLaunch 0.72s ease-out;
      isolation: isolate;
    }

    .notch {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 150px;
      height: 28px;
      background: #000;
      border-radius: 20px;
      z-index: 20;
      pointer-events: none;
    }

    @keyframes appLaunch {
      0% {
        opacity: 0;
        transform: scale(0.93);
        filter: blur(8px);
      }
      70% {
        opacity: 1;
        transform: scale(1.015);
        filter: blur(0);
      }
      100% {
        transform: scale(1);
      }
    }

    .sparkles {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }

    .sparkle {
      position: absolute;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.82);
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.72);
      animation: twinkle 3.2s infinite ease-in-out;
      opacity: 0.5;
    }

    @keyframes twinkle {
      0%, 100% {
        transform: scale(0.75);
        opacity: 0.2;
      }
      50% {
        transform: scale(1.15);
        opacity: 0.88;
      }
    }

    .content {
      position: relative;
      z-index: 2;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding:
        clamp(60px, 9vh, 82px)
        20px
        max(22px, calc(env(safe-area-inset-bottom) + 16px));
      text-align: center;
    }

    .title {
      margin: 0;
      font-size: clamp(24px, 6vw, 29px);
      font-weight: 800;
      color: var(--pink-main);
      letter-spacing: 0.2px;
      text-shadow: 0 2px 10px rgba(255, 255, 255, 0.45);
    }

    .subtitle {
      margin-top: 10px;
      font-size: clamp(12px, 3.2vw, 13px);
      color: var(--text-soft);
      font-weight: 600;
      letter-spacing: 0.4px;
    }

    .apps-wrap {
      position: relative;
      width: 100%;
      max-width: 310px;
      margin-top: 30px;
    }

    .dock-glow {
      position: absolute;
      left: 50%;
      bottom: 8px;
      transform: translateX(-50%);
      width: 92%;
      height: 90px;
      border-radius: 999px;
      background:
        radial-gradient(ellipse at center,
          rgba(244, 143, 177, 0.18) 0%,
          rgba(248, 187, 208, 0.11) 36%,
          rgba(255, 255, 255, 0.04) 64%,
          transparent 100%);
      filter: blur(10px);
      pointer-events: none;
      z-index: 0;
    }

    .apps-grid {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 294px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px 14px;
      justify-items: center;
      margin: 0 auto;
    }

    .app-card {
      width: 100%;
      max-width: 86px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      opacity: 0;
      transform: translateY(16px) scale(0.96);
      animation: cardIn 0.6s ease forwards;
    }

    .app-card:nth-child(1) { animation-delay: 0.06s; }
    .app-card:nth-child(2) { animation-delay: 0.12s; }
    .app-card:nth-child(3) { animation-delay: 0.18s; }
    .app-card:nth-child(4) { animation-delay: 0.24s; }
    .app-card:nth-child(5) { animation-delay: 0.30s; }
    .app-card:nth-child(6) { animation-delay: 0.36s; }

    @keyframes cardIn {
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .app-icon {
      width: 70px;
      height: 70px;
      border-radius: 21px;
      background: var(--card-bg);
      border: 1.5px solid rgba(244, 166, 200, 0.88);
      box-shadow: var(--shadow-soft);
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      min-height: 70px;
      min-width: 70px;
      transform: translateY(0) scale(1);
      isolation: isolate;
      will-change: transform;
    }

    .app-icon::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 2;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.72), transparent 40%),
        linear-gradient(180deg, rgba(255,255,255,0.16), rgba(244,143,177,0.05));
      pointer-events: none;
    }

    .app-icon::after {
      content: "";
      position: absolute;
      top: -20%;
      left: -140%;
      width: 90%;
      height: 140%;
      transform: rotate(18deg);
      background: linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,0.55),
        transparent
      );
      opacity: 0;
      pointer-events: none;
      z-index: 4;
      transition:
        left 0.6s ease,
        opacity 0.25s ease;
    }

    .icon-tint {
      position: absolute;
      inset: 0;
      z-index: 1;
      opacity: 0.22;
      pointer-events: none;
      mix-blend-mode: screen;
    }

    .tint-album {
      background: radial-gradient(circle at 30% 25%, #ffc6df, transparent 60%);
    }

    .tint-letters {
      background: radial-gradient(circle at 70% 20%, #ffd6ea, transparent 58%);
    }

    .tint-games {
      background: radial-gradient(circle at 50% 50%, #ffc0d8, transparent 62%);
    }

    .tint-kinfo {
      background: radial-gradient(circle at 30% 70%, #ffd4e6, transparent 60%);
    }

    .tint-einfo {
      background: radial-gradient(circle at 70% 70%, #ffc7e0, transparent 60%);
    }

    .tint-scroll {
      background: radial-gradient(circle at 50% 25%, #ffdceb, transparent 62%);
    }

    .app-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
      position: relative;
      z-index: 3;
      border-radius: inherit;
      transform: scale(1);
      transition: transform var(--ease), filter var(--ease);
    }

    .img-fallback {
      position: absolute;
      inset: 0;
      z-index: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--pink-main);
      font-size: 20px;
      font-weight: 800;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.74), rgba(255,241,247,0.9));
      padding: 6px;
      text-align: center;
      line-height: 1.1;
    }

    .app-label {
      margin-top: 8px;
      font-size: 11.5px;
      line-height: 1.22;
      color: var(--text-soft);
      font-weight: 700;
      min-height: 30px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      text-align: center;
      max-width: 84px;
      transition: transform var(--ease), color var(--ease), opacity var(--ease);
    }

    .app-card:hover .app-icon,
    .app-card:focus-within .app-icon,
    .app-icon:hover,
    .app-icon:focus-visible,
    .app-icon:active {
      transform: translateY(-3px) scale(1.08);
      box-shadow: var(--shadow-hover);
      filter: saturate(1.02);
    }

    .app-card:hover .app-icon::after,
    .app-card:focus-within .app-icon::after,
    .app-icon:hover::after,
    .app-icon:focus-visible::after,
    .app-icon:active::after {
      left: 150%;
      opacity: 1;
    }

    .app-card:hover .app-label,
    .app-card:focus-within .app-label {
      transform: translateY(1px);
      color: var(--pink-deep);
    }

    .app-icon:hover img,
    .app-icon:focus-visible img,
    .app-icon:active img {
      transform: scale(1.03);
    }

    .app-icon:focus-visible {
      outline: 2px solid rgba(216, 108, 156, 0.32);
      outline-offset: 3px;
    }

    .back-btn {
      margin-top: auto;
      background: linear-gradient(180deg, #f7a3c3, #ef87b4);
      color: #fff;
      padding: 10px 20px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      box-shadow: 0 10px 22px rgba(216, 108, 156, 0.22);
      min-height: 42px;
    }

    .back-btn:hover,
    .back-btn:focus-visible {
      transform: translateY(-1px);
      box-shadow: 0 14px 28px rgba(216, 108, 156, 0.26);
    }

    .fade-out {
      animation: fadeOut 0.85s forwards;
    }

    @keyframes fadeOut {
      to {
        opacity: 0;
        transform: scale(1.03);
      }
    }

    @media (max-width: 500px) {
      html,
      body {
        background: #000;
      }

      body {
        width: 100vw;
        min-height: 100vh;
        min-height: 100dvh;
        min-height: -webkit-fill-available;
      }

      .phone-frame {
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        aspect-ratio: auto;
        border-radius: 0;
        padding: 0;
        box-shadow: none;
        background: transparent;
      }

      .phone-screen {
        border-radius: 0;
      }

      .notch {
        display: none;
      }

      .app-card:active .app-icon,
      .app-icon:active {
        transform: translateY(-2px) scale(1.06);
      }
    }

    @media (max-height: 720px) {
      .content {
        padding-top: clamp(48px, 8vh, 64px);
      }

      .apps-wrap {
        margin-top: 24px;
      }

      .apps-grid {
        gap: 16px 12px;
      }

      .app-icon {
        width: 64px;
        height: 64px;
        min-width: 64px;
        min-height: 64px;
        border-radius: 19px;
      }

      .app-label {
        font-size: 11px;
        min-height: 24px;
      }

      .back-btn {
        padding: 9px 18px;
        font-size: 12.5px;
      }

      .dock-glow {
        height: 76px;
      }
    }
  </style>
</head>

<body>
  <div class="phone-frame">
    <div class="phone-screen" id="screen">
      <div class="notch"></div>

      <div class="sparkles" aria-hidden="true">
        <span class="sparkle" style="top:12%;left:14%;animation-delay:0s;"></span>
        <span class="sparkle" style="top:18%;left:82%;animation-delay:.8s;"></span>
        <span class="sparkle" style="top:28%;left:10%;animation-delay:1.4s;"></span>
        <span class="sparkle" style="top:34%;left:76%;animation-delay:2.1s;"></span>
        <span class="sparkle" style="top:52%;left:18%;animation-delay:1.1s;"></span>
        <span class="sparkle" style="top:58%;left:84%;animation-delay:2.8s;"></span>
        <span class="sparkle" style="top:74%;left:12%;animation-delay:.5s;"></span>
        <span class="sparkle" style="top:80%;left:72%;animation-delay:1.9s;"></span>
      </div>

      <div class="content">
        <h1 class="title">LOVE TOKEN K&amp;E</h1>
        <div class="subtitle">CHOOSE ANY ♡</div>

        <div class="apps-wrap">
          <div class="dock-glow" aria-hidden="true"></div>

          <div class="apps-grid">
            <div class="app-card">
              <button class="app-icon" type="button" data-page="3rdpage.html" aria-label="Album">
                <div class="img-fallback">A</div>
                <div class="icon-tint tint-album"></div>
                <img src="images/Hubpage/1.png" alt="Album icon" onerror="this.style.display='none'">
              </button>
              <div class="app-label">Album</div>
            </div>

            <div class="app-card">
              <button class="app-icon" type="button" data-page="4thpage.html" aria-label="Letters">
                <div class="img-fallback">L</div>
                <div class="icon-tint tint-letters"></div>
                <img src="images/Hubpage/2.png" alt="Letters icon" onerror="this.style.display='none'">
              </button>
              <div class="app-label">Letters</div>
            </div>

            <div class="app-card">
              <button class="app-icon" type="button" data-page="5thpage.html" aria-label="Games">
                <div class="img-fallback">G</div>
                <div class="icon-tint tint-games"></div>
                <img src="images/Hubpage/3.png" alt="Games icon" onerror="this.style.display='none'">
              </button>
              <div class="app-label">Games</div>
            </div>

            <div class="app-card">
              <button class="app-icon" type="button" data-page="kinfo.html" aria-label="K Info">
                <div class="img-fallback">K</div>
                <div class="icon-tint tint-kinfo"></div>
                <img src="images/Hubpage/4.png" alt="K Info icon" onerror="this.style.display='none'">
              </button>
              <div class="app-label">K Info</div>
            </div>

            <div class="app-card">
              <button class="app-icon" type="button" data-page="einfo.html" aria-label="E Info">
                <div class="img-fallback">E</div>
                <div class="icon-tint tint-einfo"></div>
                <img src="images/Hubpage/5.png" alt="E Info icon" onerror="this.style.display='none'">
              </button>
              <div class="app-label">E Info</div>
            </div>

            <div class="app-card">
              <button class="app-icon" type="button" data-page="k&escroll.html" aria-label="K and E Scrolling">
                <div class="img-fallback">K&amp;E</div>
                <div class="icon-tint tint-scroll"></div>
                <img src="images/Hubpage/6.png" alt="K and E Scrolling icon" onerror="this.style.display='none'">
              </button>
              <div class="app-label">KandE Scrolling</div>
            </div>
          </div>
        </div>

        <button class="back-btn" id="backBtn" type="button">← Back</button>
      </div>
    </div>
  </div>

  <script>
    const screen = document.getElementById("screen");
    const appButtons = document.querySelectorAll(".app-icon");
    const backBtn = document.getElementById("backBtn");
    let isLeaving = false;

    function goToPage(page) {
      if (isLeaving) return;
      isLeaving = true;

      screen.classList.add("fade-out");

      setTimeout(() => {
        window.location.href = page;
      }, 850);
    }

    appButtons.forEach((button) => {
      button.addEventListener("click", () => {
        goToPage(button.dataset.page);
      });
    });

    backBtn.addEventListener("click", () => {
      goToPage("2ndpage.html");
    });
  </script>
</body>
</html>
