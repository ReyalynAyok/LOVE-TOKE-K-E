<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />
  <meta name="theme-color" content="#fce4ec" />
  <title>Hidden Envelope 💌</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --pink-main: #d86c9c;
      --pink-deep: #c85a8d;
      --pink-soft: #f48fb1;
      --pink-light: #f8bbd0;
      --pink-border: #f4a6c8;
      --text-soft: #b85f87;

      --bg-1: #fff7fb;
      --bg-2: #ffeaf4;
      --bg-3: #fbeaff;

      --glass: rgba(255, 255, 255, 0.82);
      --shadow-soft: 0 14px 32px rgba(216, 108, 156, 0.14);
      --shadow-strong: 0 24px 60px rgba(0, 0, 0, 0.28);

      --frame-radius: 50px;
      --screen-radius: 40px;
      --phone-width: min(390px, 94vw);
      --ease: 0.22s ease;
    }

    html,
    body {
      width: 100%;
      margin: 0;
      overflow: hidden;
      overscroll-behavior: none;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0d7df;
      touch-action: manipulation;
      min-height: 100vh;
      min-height: 100dvh;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      min-height: -webkit-fill-available;
      display: flex;
      justify-content: center;
      align-items: center;
      user-select: none;
      -webkit-user-select: none;
    }

    button,
    input {
      font-family: inherit;
    }

    button {
      transition:
        transform 0.15s ease,
        box-shadow var(--ease),
        opacity var(--ease),
        background var(--ease),
        color var(--ease);
      border: none;
      outline: none;
      cursor: pointer;
    }

    button:active {
      transform: scale(0.96);
    }

    .phone-frame {
      width: var(--phone-width);
      aspect-ratio: 390 / 844;
      background: #000;
      border-radius: var(--frame-radius);
      padding: 12px;
      box-shadow: var(--shadow-strong);
      position: relative;
      isolation: isolate;
    }

    .phone-screen {
      width: 100%;
      height: 100%;
      border-radius: var(--screen-radius);
      overflow: hidden;
      position: relative;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      animation: appLaunch 0.72s ease-out;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.58), transparent 30%),
        linear-gradient(180deg, var(--bg-1), var(--bg-2), var(--bg-3));
      display: flex;
      flex-direction: column;
      padding-left: 20px;
      padding-right: 20px;
      isolation: isolate;
    }

    .notch {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 150px;
      height: 28px;
      background: #000;
      border-radius: 20px;
      z-index: 20;
      pointer-events: none;
    }

    @keyframes appLaunch {
      0% {
        opacity: 0;
        transform: scale(0.93);
        filter: blur(8px);
      }
      70% {
        opacity: 1;
        transform: scale(1.015);
        filter: blur(0);
      }
      100% {
        transform: scale(1);
      }
    }

    .fade-out {
      animation: fadeOut 0.85s forwards;
    }

    @keyframes fadeOut {
      to {
        opacity: 0;
        transform: scale(1.03);
      }
    }

    .bg-glow {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 25% 20%, rgba(255, 182, 212, 0.3), transparent 28%),
        radial-gradient(circle at 78% 18%, rgba(255, 215, 230, 0.24), transparent 24%),
        radial-gradient(circle at 50% 82%, rgba(244, 143, 177, 0.14), transparent 30%);
      pointer-events: none;
      z-index: 0;
    }

    .topbar {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding-top: calc(env(safe-area-inset-top) + 30px);
    }

    .back-btn,
    .mini-pill {
      min-height: 36px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.84);
      color: var(--pink-main);
      font-size: 12px;
      font-weight: 700;
      box-shadow: 0 8px 18px rgba(216, 108, 156, 0.1);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .back-btn:hover,
    .back-btn:focus-visible {
      transform: translateY(-1px);
      box-shadow: 0 12px 22px rgba(216, 108, 156, 0.16);
    }

    .mini-pill {
      pointer-events: none;
      opacity: 0.92;
    }

    .secret-wrap {
      position: relative;
      z-index: 2;
      flex: 1;
      width: 100%;
      max-width: 286px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding-bottom: 8px;
    }

    .title {
      color: var(--pink-main);
      font-size: 22px;
      font-weight: 800;
      margin: 0 0 8px;
      letter-spacing: 0.15px;
    }

    .subtitle {
      color: var(--text-soft);
      opacity: 0.84;
      font-size: 12.5px;
      line-height: 1.45;
      margin: 0 0 22px;
      max-width: 250px;
    }

    .envelope {
      width: 214px;
      height: 154px;
      background:
        linear-gradient(180deg, #ffffff, #fff3f8);
      border-radius: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 38px;
      cursor: pointer;
      box-shadow:
        0 14px 30px rgba(204, 92, 143, 0.12),
        0 0 0 1px rgba(255,255,255,0.68) inset;
      position: relative;
      animation: floatEnvelope 4s ease-in-out infinite;
      user-select: none;
      overflow: hidden;
      transition: transform var(--ease), box-shadow var(--ease), filter var(--ease);
      will-change: transform;
    }

    .envelope::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 20px;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.84), rgba(255,255,255,0.16));
      pointer-events: none;
    }

    .envelope::after {
      content: "";
      position: absolute;
      top: -12%;
      left: -130%;
      width: 80%;
      height: 130%;
      background: linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.4),
        transparent
      );
      transform: rotate(16deg);
      transition: left 0.7s ease;
      pointer-events: none;
    }

    .envelope:hover,
    .envelope:focus-visible {
      transform: translateY(-2px) scale(1.02);
      box-shadow:
        0 18px 34px rgba(204, 92, 143, 0.18),
        0 0 0 1px rgba(255,255,255,0.7) inset;
      filter: saturate(1.02);
    }

    .envelope:hover::after,
    .envelope:focus-visible::after {
      left: 145%;
    }

    .envelope:active {
      transform: scale(0.98);
    }

    @keyframes floatEnvelope {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    .hint {
      margin-top: 14px;
      font-size: 12px;
      color: var(--pink-deep);
      opacity: 0.9;
      line-height: 1.4;
    }

    #passwordArea {
      width: 100%;
      display: none;
      margin-top: 18px;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 10px;
      animation: revealArea 0.28s ease;
    }

    @keyframes revealArea {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .password-wrap {
      width: min(244px, 86%);
      position: relative;
    }

    .password-input {
      width: 100%;
      padding: 12px 50px 12px 12px;
      border-radius: 14px;
      border: 1px solid rgba(204, 92, 143, 0.22);
      text-align: center;
      font-size: 16px;
      background: rgba(255, 255, 255, 0.94);
      outline: none;
      color: var(--text-soft);
      box-shadow: 0 8px 18px rgba(204, 92, 143, 0.08);
    }

    .password-input:focus {
      border-color: var(--pink-soft);
      box-shadow: 0 0 0 3px rgba(255, 111, 165, 0.16);
    }

    .toggle-pass {
      position: absolute;
      top: 50%;
      right: 10px;
      transform: translateY(-50%);
      background: transparent;
      color: var(--pink-main);
      font-size: 13px;
      font-weight: 700;
      padding: 4px 6px;
      box-shadow: none;
      min-height: auto;
    }

    .toggle-pass:hover,
    .toggle-pass:focus-visible {
      color: var(--pink-deep);
    }

    .btn {
      width: min(244px, 86%);
      padding: 12px 15px;
      border-radius: 16px;
      background: linear-gradient(45deg, var(--pink-soft), var(--pink-light));
      color: white;
      font-size: 14px;
      font-weight: 700;
      box-shadow: 0 12px 24px rgba(255, 105, 180, 0.22);
      min-height: 46px;
    }

    .btn:hover,
    .btn:focus-visible {
      transform: translateY(-1px);
      box-shadow: 0 14px 28px rgba(255, 105, 180, 0.26);
    }

    .error {
      min-height: 18px;
      font-size: 12.5px;
      color: #e15c78;
      text-align: center;
      margin-top: 2px;
      line-height: 1.4;
    }

    .sparkle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: white;
      border-radius: 50%;
      opacity: 0;
      animation: sparkleAnim 3s linear infinite;
      pointer-events: none;
      z-index: 1;
    }

    @keyframes sparkleAnim {
      0% { opacity: 0; transform: scale(0.7); }
      50% { opacity: 1; transform: scale(1.1); }
      100% { opacity: 0; transform: scale(0.8); }
    }

    @media (max-width: 500px) {
      html,
      body {
        background: black;
      }

      body {
        width: 100vw;
        min-height: 100vh;
        min-height: 100dvh;
        min-height: -webkit-fill-available;
      }

      .phone-frame {
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        aspect-ratio: auto;
        border-radius: 0;
        padding: 0;
        box-shadow: none;
      }

      .phone-screen {
        border-radius: 0;
      }

      .notch {
        display: none;
      }
    }

    @media (max-height: 700px) {
      .title {
        font-size: 20px;
      }

      .subtitle {
        margin-bottom: 18px;
      }

      .envelope {
        width: 194px;
        height: 140px;
        font-size: 34px;
      }

      .topbar {
        padding-top: calc(env(safe-area-inset-top) + 24px);
      }
    }
  </style>
</head>

<body>
  <div class="phone-frame">
    <div class="phone-screen" id="screen">
      <div class="notch"></div>
      <div class="bg-glow"></div>

      <div class="topbar">
        <button class="back-btn" id="backBtn" type="button">← Back</button>
        <div class="mini-pill">Secret</div>
      </div>

      <div class="secret-wrap">
        <h1 class="title">Hidden Envelope 💌</h1>
        <p class="subtitle">A tiny secret waiting for the right key.</p>

        <div class="envelope" id="secretEnvelope" role="button" tabindex="0" aria-label="Open hidden envelope">💌</div>
        <div class="hint">Tap the envelope to reveal the password box.</div>

        <div id="passwordArea">
          <div class="password-wrap">
            <input
              type="password"
              id="passInput"
              class="password-input"
              placeholder="Enter password"
              autocomplete="off"
            />
            <button class="toggle-pass" id="togglePassBtn" type="button">Show</button>
          </div>

          <button class="btn" id="unlockBtn" type="button">Unlock</button>
          <div class="error" id="errorMsg"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const PASSWORD = "ILOVEKIOSOMUCHHH!";

    const screen = document.getElementById("screen");
    const passwordArea = document.getElementById("passwordArea");
    const passInput = document.getElementById("passInput");
    const unlockBtn = document.getElementById("unlockBtn");
    const errorMsg = document.getElementById("errorMsg");
    const secretEnvelope = document.getElementById("secretEnvelope");
    const togglePassBtn = document.getElementById("togglePassBtn");
    const backBtn = document.getElementById("backBtn");

    let sparkleTimer = null;
    let revealed = false;
    let isLeaving = false;

    function goToPage(url) {
      if (isLeaving) return;
      isLeaving = true;
      screen.classList.add("fade-out");

      setTimeout(() => {
        window.location.href = url;
      }, 850);
    }

    function askPassword() {
      if (revealed) {
        passInput.focus();
        return;
      }

      revealed = true;
      passwordArea.style.display = "flex";
      errorMsg.textContent = "";

      setTimeout(() => {
        passInput.focus();
      }, 120);
    }

    function checkPass() {
      const userValue = passInput.value.trim();

      if (userValue === PASSWORD) {
        errorMsg.textContent = "";
        goToPage("finalhidden.html");
      } else {
        errorMsg.textContent = "Wrong password 💔";
        passInput.value = "";
        setTimeout(() => {
          passInput.focus();
        }, 80);
      }
    }

    function togglePassword() {
      const isHidden = passInput.type === "password";
      passInput.type = isHidden ? "text" : "password";
      togglePassBtn.textContent = isHidden ? "Hide" : "Show";
      passInput.focus();
    }

    function createSparkle() {
      const s = document.createElement("div");
      s.className = "sparkle";
      s.style.top = Math.random() * 100 + "%";
      s.style.left = Math.random() * 100 + "%";
      screen.appendChild(s);

      setTimeout(() => s.remove(), 3000);
    }

    function startSparkles() {
      if (sparkleTimer) return;
      sparkleTimer = setInterval(createSparkle, 850);
    }

    function stopSparkles() {
      if (!sparkleTimer) return;
      clearInterval(sparkleTimer);
      sparkleTimer = null;
    }

    secretEnvelope.addEventListener("click", askPassword);
    secretEnvelope.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        askPassword();
      }
    });

    unlockBtn.addEventListener("click", checkPass);
    togglePassBtn.addEventListener("click", togglePassword);

    backBtn.addEventListener("click", () => {
      goToPage("4thpage.html");
    });

    passInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        checkPass();
      }
    });

    document.addEventListener("visibilitychange", () => {
      if (document.hidden) {
        stopSparkles();
      } else {
        startSparkles();
      }
    });

    startSparkles();
  </script>
</body>
</html>)
